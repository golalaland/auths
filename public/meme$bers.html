<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dettyverse Admin - Content Management</title>
  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background: #0a0a0a; 
      color: #fff; 
      padding: 20px; 
      margin: 0; 
    }
    .tab-container { 
      display: flex; 
      gap: 12px; 
      margin-bottom: 25px; 
      flex-wrap: wrap; 
    }
    .tab { 
      padding: 12px 24px; 
      background: #333; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: all 0.3s; 
    }
    .tab:hover { background: #444; }
    .tab.active { 
      background: #c3f60c; 
      color: #000; 
      font-weight: bold; 
    }
    .section { 
      display: none; 
      background: #1a1a1a; 
      padding: 25px; 
      border-radius: 12px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
    }
    .section.active { display: block; }

    input, textarea, button { 
      padding: 10px; 
      margin: 6px 6px 12px 0; 
      border-radius: 8px; 
      border: none; 
      font-size: 1rem; 
    }
    button { 
      background: #c3f60c; 
      color: #000; 
      cursor: pointer; 
      font-weight: bold; 
    }
    button:hover { transform: scale(1.05); }

    #loaderOverlay { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
      display: none; align-items: center; justify-content: center; z-index: 9999; 
    }
    #dopeAlert { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); 
      backdrop-filter: blur(16px); display: none; align-items: center; 
      justify-content: center; z-index: 999999; 
    }
    #dopeAlertContent { 
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
      padding: 40px 30px; border-radius: 24px; max-width: 420px; width: 90%; 
      text-align: center; box-shadow: 0 0 80px rgba(195,246,12,0.4); 
      border: 2px solid #c3f60c; 
    }

    .card-preview {
      background: #111; 
      border-radius: 12px; 
      padding: 15px; 
      margin: 12px 0; 
      border: 1px solid #333;
    }
    .card-preview h4 { margin: 0 0 8px; color: #c3f60c; }
    .actions button { margin-right: 8px; padding: 6px 12px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div id="loaderOverlay"><div id="loaderText">Working...</div></div>

  <h1>Dettyverse Content Management</h1>

  <div class="tab-container">
    <div class="tab active" data-tab="upcoming">Upcoming Events</div>
    <div class="tab" data-tab="tvshows">TV Shows</div>
  </div>

  <!-- Dope Alert -->
  <div id="dopeAlert">
    <div id="dopeAlertContent">
      <div id="dopeIcon">✅</div>
      <h2 id="dopeTitle">Success!</h2>
      <p id="dopeMessage">Operation completed successfully.</p>
      <button id="dopeClose">GOT IT</button>
    </div>
  </div>

  <!-- UPCOMING EVENTS SECTION -->
  <div id="upcoming" class="section active">
    <h2>Manage Upcoming Events</h2>
    <p>These will appear in the Live Modal → Explore tab.</p>
    <button id="fetch-upcoming">Refresh List</button>
    <button id="add-new-event">+ Add New Event</button>
    <div id="events-container" style="margin-top: 20px;"></div>

    <template id="event-form-template">
      <div style="background:#222; padding:16px; border-radius:12px; margin:16px 0;">
        <input type="text" placeholder="Title" class="event-title" style="width:100%; margin-bottom:8px;">
        <input type="text" placeholder="Time (e.g. Tonight @ 10PM EST)" class="event-time" style="width:100%; margin-bottom:8px;">
        <textarea placeholder="Description" class="event-desc" style="width:100%; height:80px; margin-bottom:8px;"></textarea>
       <textarea
  class="tv-urls"
  placeholder="One video URL per line"
  style="width:100%;height:120px;margin-bottom:12px;"
></textarea>
        <input type="url" placeholder="Link (optional)" class="event-link" style="width:100%; margin-bottom:12px;">
        <button class="save-event-btn" style="background:#c3f60c; color:#000;">Save Event</button>
        <button class="cancel-event-btn">Cancel</button>
      </div>
    </template>
  </div>

  <!-- TV SHOWS SECTION -->
  <div id="tvshows" class="section">
    <h2>Manage TV Shows (Video Lounge)</h2>
    <p>These will appear in the Video Lounge for logged-in users.</p>
    <button id="fetch-tvshows">Refresh List</button>
    <button id="add-new-tvshow">+ Add New Video</button>
    <div id="tvshows-container" style="margin-top: 20px;"></div>

    <template id="tvshow-form-template">
      <div style="background:#222; padding:16px; border-radius:12px; margin:16px 0;">
        <input type="text" placeholder="Title" class="tv-title" style="width:100%; margin-bottom:8px;">
        <input type="text" placeholder="Channel (e.g. CH 3)" class="tv-channel" style="width:100%; margin-bottom:8px;">
        <input type="url" placeholder="Direct MP4 Video URL" class="tv-url" style="width:100%; margin-bottom:12px;">
        <button class="save-tvshow-btn" style="background:#c3f60c; color:#000;">Save Video</button>
        <button class="cancel-tvshow-btn">Cancel</button>
      </div>
    </template>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getFirestore, 
    doc, 
    getDoc, 
    setDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD_GjkTox5tum9o4AupO0LeWzjTocJg8RI",
    authDomain: "dettyverse.firebaseapp.com",
    projectId: "dettyverse",
    storageBucket: "dettyverse.firebasestorage.app",
    messagingSenderId: "1036459652488",
    appId: "1:1036459652488:web:e8910172ed16e9cac9b63d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const loaderOverlay = document.getElementById("loaderOverlay");
  const loaderText = document.getElementById("loaderText");
  const dopeAlert = document.getElementById("dopeAlert");
  const dopeTitle = document.getElementById("dopeTitle");
  const dopeMessage = document.getElementById("dopeMessage");
  const dopeIcon = document.getElementById("dopeIcon");
  const dopeClose = document.getElementById("dopeClose");

  function showLoader(text = "Working...") {
    loaderText.textContent = text;
    loaderOverlay.style.display = "flex";
  }

  function hideLoader() {
    loaderOverlay.style.display = "none";
  }

  function showDopeAlert(title, message) {
    dopeTitle.textContent = title;
    dopeMessage.textContent = message;
    dopeAlert.style.display = "flex";
    setTimeout(() => dopeAlert.style.opacity = "1", 50);
  }

  dopeClose.onclick = () => {
    dopeAlert.style.opacity = "0";
    setTimeout(() => dopeAlert.style.display = "none", 400);
  };

  // Tab Switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(tab.dataset.tab).classList.add('active');
    });
  });

  // ================== COMMON SAVE FUNCTION ==================
  async function saveData(field, data) {
    try {
      await setDoc(doc(db, "settings", "live"), { [field]: data }, { merge: true });
      return true;
    } catch (err) {
      console.error(err);
      alert("Save failed: " + err.message);
      return false;
    }
  }

  // ================== TV SHOWS ==================
  async function getTVShows() {
    showLoader("Loading TV Shows...");
    const snap = await getDoc(doc(db, "settings", "live"));
    hideLoader();
    return snap.exists() ? (snap.data().tvShows || []) : [];
  }

  function renderTVShows(shows) {
    const container = document.getElementById('tvshows-container');
    container.innerHTML = '';
    if (shows.length === 0) {
      container.innerHTML = '<p style="color:#888;">No videos yet. Add some!</p>';
      return;
    }

    shows.forEach((show, index) => {
      const card = document.createElement('div');
      card.className = 'card-preview';
      card.innerHTML = `
        <h4>${show.title}</h4>
        <p><strong>Channel:</strong> ${show.channel || 'N/A'}</p>
        <p><strong>URL:</strong> <a href="${show.url}" target="_blank">View Video</a></p>
        <div class="actions">
          <button class="edit-tvshow" data-index="${index}">Edit</button>
          <button class="delete-tvshow" data-index="${index}">Delete</button>
        </div>
      `;

      card.querySelector('.edit-tvshow').onclick = () => editTVShow(index);
      card.querySelector('.delete-tvshow').onclick = () => deleteTVShow(index);
      container.appendChild(card);
    });
  }

  async function loadAndRenderTVShows() {
    const shows = await getTVShows();
    renderTVShows(shows);
  }

  async function editTVShow(index) {
    const shows = await getTVShows();
    const show = shows[index];
    const form = document.getElementById('tvshow-form-template').content.cloneNode(true).querySelector('div');

    form.querySelector('.tv-title').value = show.title || '';
    form.querySelector('.tv-channel').value = show.channel || '';
    form.querySelector('.tv-url').value = show.url || '';

    form.querySelector('.save-tvshow-btn').onclick = async () => {
      const updated = {
        title: form.querySelector('.tv-title').value.trim(),
        channel: form.querySelector('.tv-channel').value.trim(),
      videos: form.querySelector('.tv-urls')
  .value
  .split('\n')
  .map(v => v.trim())
  .filter(Boolean)
  .map((url, i) => ({
    title: `Clip ${i + 1}`,
    url
  }))
      };

      if (!updated.title || !updated.url) {
        alert("Title and Video URL are required.");
        return;
      }

      shows[index] = updated;
      if (await saveData('tvShows', shows)) {
        showDopeAlert("Updated", "Video updated successfully!");
        loadAndRenderTVShows();
      }
    };

    form.querySelector('.cancel-tvshow-btn').onclick = () => form.remove();
    document.getElementById('tvshows-container').prepend(form);
  }

  async function deleteTVShow(index) {
    if (!confirm("Delete this video?")) return;
    const shows = await getTVShows();
    shows.splice(index, 1);
    if (await saveData('tvShows', shows)) {
      showDopeAlert("Deleted", "Video removed.");
      loadAndRenderTVShows();
    }
  }

  document.getElementById('add-new-tvshow').onclick = async () => {
    const form = document.getElementById('tvshow-form-template').content.cloneNode(true).querySelector('div');

    form.querySelector('.save-tvshow-btn').onclick = async () => {
      const newShow = {
        title: form.querySelector('.tv-title').value.trim(),
        channel: form.querySelector('.tv-channel').value.trim(),
       videos: form.querySelector('.tv-urls')
  .value
  .split('\n')
  .map(v => v.trim())
  .filter(Boolean)
  .map((url, i) => ({
    title: `Clip ${i + 1}`,
    url
  }))
      };

      if (!newShow.title || !newShow.url) {
        alert("Title and Video URL are required.");
        return;
      }

      const current = await getTVShows();
      current.push(newShow);
      if (await saveData('tvShows', current)) {
        showDopeAlert("Added", "New video added!");
        loadAndRenderTVShows();
      }
    };

    form.querySelector('.cancel-tvshow-btn').onclick = () => form.remove();
    document.getElementById('tvshows-container').prepend(form);
  };

  document.getElementById('fetch-tvshows').onclick = loadAndRenderTVShows;

  // ================== UPCOMING EVENTS ==================
  const eventsContainer = document.getElementById('events-container');
  const addNewEventBtn = document.getElementById('add-new-event');
  const fetchUpcomingBtn = document.getElementById('fetch-upcoming');
  const eventFormTemplate = document.getElementById('event-form-template');

  async function getUpcomingEvents() {
    showLoader("Loading events...");
    const snap = await getDoc(doc(db, "settings", "live"));
    hideLoader();
    return snap.exists() ? (snap.data().upcomingEvents || []) : [];
  }

  function renderEvents(events) {
    eventsContainer.innerHTML = '';
    if (events.length === 0) {
      eventsContainer.innerHTML = '<p style="color:#888;">No upcoming events yet. Add one!</p>';
      return;
    }

    events.forEach((event, index) => {
      const card = document.createElement('div');
      card.className = 'card-preview';
      card.innerHTML = `
        <h4>${event.title || 'No title'}</h4>
        <p><strong>Time:</strong> ${event.time || '-'}</p>
        <p><strong>Desc:</strong> ${event.desc?.substring(0,80)}${event.desc?.length > 80 ? '...' : ''}</p>
        <p><strong>Image:</strong> <a href="${event.imageUrl}" target="_blank">view</a></p>
        ${event.link ? `<p><strong>Link:</strong> <a href="${event.link}" target="_blank">open</a></p>` : ''}
        <div class="actions">
          <button class="edit-event" data-index="${index}">Edit</button>
          <button class="delete-event" data-index="${index}">Delete</button>
        </div>
      `;

      card.querySelector('.edit-event').onclick = () => editEvent(index);
      card.querySelector('.delete-event').onclick = () => deleteEvent(index);
      eventsContainer.appendChild(card);
    });
  }

  async function loadAndRenderEvents() {
    const events = await getUpcomingEvents();
    renderEvents(events);
  }

  async function editEvent(index) {
    const events = await getUpcomingEvents();
    const event = events[index];
    const form = eventFormTemplate.content.cloneNode(true).querySelector('div');

    form.querySelector('.event-title').value = event.title || '';
    form.querySelector('.event-time').value = event.time || '';
    form.querySelector('.event-desc').value = event.desc || '';
    form.querySelector('.event-image').value = event.imageUrl || '';
    form.querySelector('.event-link').value = event.link || '';

    form.querySelector('.save-event-btn').onclick = async () => {
      const updated = {
        title: form.querySelector('.event-title').value.trim(),
        time: form.querySelector('.event-time').value.trim(),
        desc: form.querySelector('.event-desc').value.trim(),
        imageUrl: form.querySelector('.event-image').value.trim(),
        link: form.querySelector('.event-link').value.trim()
      };

      if (!updated.title || !updated.time || !updated.desc || !updated.imageUrl) {
        alert("Title, Time, Description and Image URL are required.");
        return;
      }

      events[index] = updated;
      if (await saveData('upcomingEvents', events)) {
        showDopeAlert("Updated", "Event updated successfully!");
        loadAndRenderEvents();
      }
    };

    form.querySelector('.cancel-event-btn').onclick = () => form.remove();
    eventsContainer.prepend(form);
  }

  async function deleteEvent(index) {
    if (!confirm("Delete this event?")) return;
    const events = await getUpcomingEvents();
    events.splice(index, 1);
    if (await saveData('upcomingEvents', events)) {
      showDopeAlert("Deleted", "Event removed.");
      loadAndRenderEvents();
    }
  }

  addNewEventBtn.onclick = async () => {
    const form = eventFormTemplate.content.cloneNode(true).querySelector('div');

    form.querySelector('.save-event-btn').onclick = async () => {
      const newEvent = {
        title: form.querySelector('.event-title').value.trim(),
        time: form.querySelector('.event-time').value.trim(),
        desc: form.querySelector('.event-desc').value.trim(),
        imageUrl: form.querySelector('.event-image').value.trim(),
        link: form.querySelector('.event-link').value.trim()
      };

      if (!newEvent.title || !newEvent.time || !newEvent.desc || !newEvent.imageUrl) {
        alert("Title, Time, Description and Image URL are required.");
        return;
      }

      const current = await getUpcomingEvents();
      current.push(newEvent);
      if (await saveData('upcomingEvents', current)) {
        showDopeAlert("Added", "New event created!");
        loadAndRenderEvents();
      }
    };

    form.querySelector('.cancel-event-btn').onclick = () => form.remove();
    eventsContainer.prepend(form);
  };

  fetchUpcomingBtn.onclick = loadAndRenderEvents;

  // Initial Load
  loadAndRenderEvents();
  loadAndRenderTVShows();
</script>
</body>
</html>

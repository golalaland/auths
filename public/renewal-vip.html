<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=0.9, user-scalable=no">
<title>CUBE • LEVEL UP YOUR MEMBERSHIP</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee:wght@400&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --neon: #c3f60c;
    --gold: #f7d774;
    --gold-deep: #caa12b;
    --deep: #0a1400;
    --input-bg: rgba(10, 25, 0, 0.65);
    --input-border: rgba(195, 246, 12, 0.5);
    --glow: rgba(247, 215, 116, 0.35);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
    min-height: 100vh;
    background: var(--deep);
    font-family: 'Poppins', sans-serif;
    color: #fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 2rem 1rem 3rem;
    overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.hero-video {
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.35;
    z-index:-3;
}
.hero-overlay {
    position:fixed;
    inset:0;
    background: linear-gradient(180deg, transparent 25%, #000 90%);
    z-index:-2;
}

/* LOGO */
.logo-container {
    margin: 2rem 0 1rem;
    text-align:center;
}
.logo {
    height: 210px;
    max-width: 92vw;
    filter: drop-shadow(0 0 55px #c3f60c);
}

/* TAGLINE */
.tagline-wrapper{
    text-align:center;
    margin: 0.6rem 0 2.4rem;
}
.tagline-static{
    font-size: 1.80rem;
    color: #e0ff80;
    font-weight: 600;
    margin-bottom: 10px;
}
.tagline-slider{
    height: 28px;
    overflow:hidden;
    position:relative;
}
.tagline-slider span{
    display:block;
    font-size: 1.18rem;
    color: #c3f60c;
    font-weight:500;
    position:absolute;
    width:100%;
    left:0;
    opacity:0;
    transform: translateY(18px) scale(0.98);
    filter: blur(6px);
    animation: slideWords 12s infinite;
}
.tagline-slider span:nth-child(1){ animation-delay: 0s; }
.tagline-slider span:nth-child(2){ animation-delay: 2s; }
.tagline-slider span:nth-child(3){ animation-delay: 4s; }
.tagline-slider span:nth-child(4){ animation-delay: 6s; }
.tagline-slider span:nth-child(5){ animation-delay: 8s; }

@keyframes slideWords {
    0% { opacity:0; transform: translateY(18px); filter: blur(6px); }
    10% { opacity:1; transform: translateY(0); filter: blur(0); }
    25% { opacity:1; transform: translateY(0); }
    40% { opacity:0; transform: translateY(-18px); filter: blur(4px); }
    100% { opacity:0; }
}

/* FORM */
.form-container {
    width:100%;
    max-width: 420px;
    display:flex;
    flex-direction:column;
    gap:12px;
}
.form-group input {
    width:100%;
    padding: 1.25rem 1.6rem;
    border-radius: 60px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color:#fff;
    font-size:1.05rem;
    text-align:center;
    transition:0.25s ease;
    backdrop-filter: blur(16px);
}
.form-group input:focus {
    outline:none;
    transform: scale(1.03);
    border-color: var(--neon);
    box-shadow:0 0 35px rgba(195,246,12,0.35);
}

/* MESSAGE */
#message {
    margin: 1.2rem 0;
    text-align:center;
    min-height: 1.2em;
    font-weight:500;
}
#payBtn {
    margin-top: 1.3rem;
    width: fit-content;
    min-width: 115px;           /* Much tighter */
    padding: 0.85rem 2.1rem;    /* Reduced horizontal padding */
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #1a1200;
    background: linear-gradient(
        120deg,
        #f7d774 0%,
        #fff3b0 30%,
        #caa12b 50%,
        #fff3b0 70%,
        #f7d774 100%
    );
    background-size: 300% 100%;
    animation: goldShimmer 4s ease-in-out infinite;
    box-shadow: 0 10px 30px rgba(247,215,116,0.28);
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

#payBtn:hover {
    transform: translateY(-4px) scale(1.08);
    box-shadow: 0 22px 60px rgba(247,215,116,0.4);
}

#payBtn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    animation: none;
}

/* ==================== SPINNER FOR SMALL BUTTON ==================== */
#payBtn.loading {
    pointer-events: none;
    color: transparent !important;
    min-width: 55px;
    padding: 0.85rem 1.6rem;
}

#payBtn.loading::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 19px;
    height: 19px;
    border: 3px solid rgba(26, 18, 0, 0.35);
    border-top: 3px solid #1a1200;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}
    
/* FOOTER */
.footer {
    margin-top: 4rem;
    padding: 2rem 1rem;
    text-align: center;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.5);
    border-top: 1px solid rgba(195, 246, 12, 0.1);
    width: 100%;
}
.footer span { color: var(--neon); }

@media(max-width:600px){
    .logo { height: 170px; }
    #payBtn { width: 50%; max-width: 50%; }
}
</style>
</head>
<body>

<video class="hero-video" autoplay muted loop playsinline>
    <source src="https://cdn.shopify.com/videos/c/o/v/8d1f9e76b0374ef49c9ad0f335437a1f.mp4">
</video>
<div class="hero-overlay"></div>

<div class="logo-container">
    <img class="logo" src="https://cdn.shopify.com/s/files/1/0962/6648/6067/files/HABA_HOUSE.png?v=1765412962">
</div>

<div class="tagline-wrapper">
    <div class="tagline-static">LEVEL UP YOUR EXPERIENCE</div>
    <div class="tagline-slider">
        <span>Boost your host's tab </span>
        <span>Support real energy ⚡️</span>
        <span>Unlock premium perks ꗃ </span>
        <span>Upgrade your membership $ </span>
        <span>Move with intention </span>
    </div>
</div>

<div class="form-container">
    <div class="form-group"><input type="text" placeholder="@username" id="chatId"></div>
    <div class="form-group"><input type="email" placeholder="Email Address" id="email"></div>
</div>

<div id="message"></div>
<button id="payBtn">BOOST</button>

<div class="footer">
    © 2026 CUBE. All rights reserved. • <span>UYE™</span>
</div>

<script src="https://js.paystack.co/v2/inline.js"></script>
<script type="module">
    // ====================== IMPORTS & INITIALIZATION ======================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
        getFirestore,
        doc,
        getDoc,
        updateDoc,
        serverTimestamp,
        increment,
        addDoc,
        collection
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_GjkTox5tum9o4AupO0LeWzjTocJg8RI",
        authDomain: "dettyverse.firebaseapp.com",
        projectId: "dettyverse",
        storageBucket: "dettyverse.firebasestorage.app",
        messagingSenderId: "1036459652488",
        appId: "1:1036459652488:web:e8910172ed16e9cac9b63d",
        measurementId: "G-NX2KWZW85V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ====================== DOM ELEMENTS ======================
    const payBtn = document.getElementById('payBtn');
    const chatIdInput = document.getElementById('chatId');
    const emailInput = document.getElementById('email');
    const messageEl = document.getElementById('message');

    // ====================== UTILITIES ======================
    const sanitizeKey = (email) => 
        email.trim().toLowerCase()
            .replace(/[@.]/g, '_')
            .replace(/[,\\/*[\]]/g, '_')
            .replace(/_+/g, '_')
            .replace(/^_|_$/g, '');

    function showMessage(text, isError = false) {
        messageEl.textContent = text;
        messageEl.style.color = isError ? '#ff4444' : '#c3f60c';
    }

const boostSound = new Audio(
  "https://raw.githubusercontent.com/golalaland/999/main/assets/benkirb-shine-1-268902.mp3"
);
    boostSound.volume = 0.8;

    function createExplosion() {
        // Flash effect
        const flash = document.createElement('div');
        flash.style.cssText = `
            position:fixed; inset:0; background:rgba(195,246,12,0.3);
            z-index:9998; pointer-events:none;
        `;
        document.body.appendChild(flash);
        flash.animate([{ opacity: 0 }, { opacity: 0.65 }, { opacity: 0 }], { duration: 300 });
        setTimeout(() => flash.remove(), 450);

        // Particles
        const colors = ['#c3f60c', '#f0ff7a', '#a0d00a', '#ffffff'];
        for (let i = 0; i < 90; i++) {
            const p = document.createElement('div');
            p.style.cssText = `
                position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
                width:${Math.random() * 10 + 5}px; height:${Math.random() * 10 + 5}px;
                background:${colors[Math.floor(Math.random() * colors.length)]};
                border-radius:50%; box-shadow:0 0 25px currentColor;
                z-index:9999; pointer-events:none;
            `;
            document.body.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 420 + 140;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity - 90;

            p.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) scale(0.1)`, opacity: 0 }
            ], {
                duration: Math.random() * 950 + 750,
                easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)'
            });

            setTimeout(() => p.remove(), 1700);
        }
    }

    // ====================== BUTTON STATE MANAGEMENT ======================
    function setLoading(isLoading) {
        if (isLoading) {
            payBtn.disabled = true;
            payBtn.classList.add('loading');
        } else {
            payBtn.disabled = false;
            payBtn.classList.remove('loading');
            payBtn.textContent = "BOOST NOW";
        }
    }

    function resetButton() {
        setLoading(false);
    }

    // ====================== MAIN BOOST HANDLER ======================
    payBtn.onclick = async () => {
        const chatId = chatIdInput.value.trim().replace(/^@+/, '');
        const email = emailInput.value.trim().toLowerCase();

        // Validation
        if (!chatId || !email) {
            showMessage('Please fill in all fields', true);
            return;
        }
        if (!email.includes('@')) {
            showMessage('Please enter a valid email', true);
            return;
        }

        // Start visual & audio feedback
        boostSound.currentTime = 0;
        boostSound.play().catch(() => {});
        createExplosion();

        // Activate loading state (spinner only)
        setLoading(true);
        showMessage('Verifying your account...');

        const docId = sanitizeKey(email);
        const userRef = doc(db, "users", docId);

        try {
            const snap = await getDoc(userRef);

            if (!snap.exists()) {
                showMessage('Account not found', true);
                resetButton();
                return;
            }

            const userData = snap.data();

            if (userData.chatIdLower !== chatId.toLowerCase()) {
                showMessage('Username does not match our records', true);
                resetButton();
                return;
            }

            if (!userData.isVIP) {
                showMessage('This account is not VIP — upgrade first', true);
                resetButton();
                return;
            }

            showMessage('Verified! Opening payment...');

            // ====================== PAYSTACK PAYMENT ======================
            const handler = PaystackPop.setup({
                key: 'pk_test_9446fa6b81888ffce77cc94294530d761aac4ccd',
                email: email,
                amount: 10749 * 100,
                currency: 'NGN',
                ref: `BOOST_${Date.now()}`,
                metadata: {
                    chatId: chatId,
                    type: 'renewal'
                },
                callback: async (response) => {
                    showMessage('Processing your boost...');
                    try {
                        const freshSnap = await getDoc(userRef);
                        const freshUserData = freshSnap.data();
                        const inviterId = freshUserData?.invitedBy;

                        // Update user
                        await updateDoc(userRef, {
                            hasPaid: true,
                            membershipLevel: increment(1),
                            vipRenewedAt: serverTimestamp(),
                            stars: increment(1000),
                            starsReward: increment(1000),
                            vipExpiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000),
                            lastUpdated: serverTimestamp()
                        });

 if (inviterId) {
                                const inviterRef = doc(db, "users", inviterId);
                                await updateDoc(inviterRef, {
                                    cash: increment(2500),
                                    cashReward: increment(2500),
                                    points: increment(5),
                                    lastUpdated: serverTimestamp()
                                });

                                await addDoc(collection(db, "notifications"), {
                                    recipientId: inviterId,
                                    type: "renewal_reward",
                                    title: "₦2,500 Cash Reward Earned!",
                                    message: `@${freshUserData.chatId || "someone"} just boosted!`,
                                    relatedUserId: docId,
                                    relatedUserName: freshUserData.chatId || chatId,
                                    read: false,
                                    createdAt: serverTimestamp()
                                });
                            }

                            await addDoc(collection(db, "notifications"), {
                                recipientId: docId,
                                type: "renewal_success",
                                title: "Boost Activated! 🔥",
                                message: "Your host tab has been boosted. Enjoy your new perks!",
                                read: false,
                                createdAt: serverTimestamp()
                            });

                        showMessage('Boost Complete! 🔥');
                        setTimeout(() => {
                            window.location.href = "https://cube.xixi.live/34d505af-271a-48ec-a8a9-2f6f22d5e710";
                        }, 1600);

                    } catch (err) {
                        console.error('Sync error:', err);
                        showMessage('Payment successful. Contact support for activation.', true);
                        setTimeout(() => window.location.href = "https://visitcube.xyz", 4000);
                    }
                },
                onClose: () => {
                    showMessage('Payment was cancelled');
                    resetButton();
                }
            });

            handler.openIframe();

        } catch (err) {
            console.error('Verification error:', err);
            showMessage('Something went wrong. Please try again.', true);
            resetButton();
        }
    };
</script>
</body>
</html>

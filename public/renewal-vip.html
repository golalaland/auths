<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=0.85, user-scalable=no">
    <title>CUBE • BOOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee:wght@400&family=Orbitron:wght@700;900&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #c3f60c;
            --neon-dark: #a0d00a;
            --deep: #0a1400;
            --glow: rgba(195, 246, 12, 0.6);
            --input-bg: rgba(10, 25, 0, 0.65);
            --input-border: rgba(195, 246, 12, 0.5);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            min-height: 100vh;
            background: var(--deep);
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem;
            position: relative;
            overflow-x: hidden;
        }

        .hero-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -3;
            opacity: 0.35;
            filter: brightness(0.65) contrast(1.25);
        }

        .hero-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 30%, #000 85%);
            z-index: -2;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 6px; height: 6px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--neon);
            animation: float 14s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-120px) translateX(140px); opacity: 0; }
        }

        .logo-container {
            margin: 2rem 0 1.8rem;
            text-align: center;
            width: 100%;
        }

        .logo {
            height: 260px;
            width: auto;
            max-width: 96vw;
            object-fit: contain;
            filter: drop-shadow(0 0 50px #c3f60c) drop-shadow(0 0 100px rgba(195,246,12,0.8));
            animation: logoPulse 3.5s infinite alternate ease-in-out;
        }

        @keyframes logoPulse {
            from { filter: drop-shadow(0 0 50px #c3f60c) drop-shadow(0 0 100px rgba(195,246,12,0.8)); }
            to { filter: drop-shadow(0 0 70px #c3f60c) drop-shadow(0 0 140px rgba(195,246,12,1)); }
        }

        h1 {
            font-family: 'Bungee', sans-serif;
            font-size: 5.8rem;
            font-weight: 400;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #c3f60c, #f0ff7a, #c3f60c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 30px #c3f60c,
                0 0 60px #c3f60c,
                4px 4px 0 #000,
                -2px -2px 0 #000;
            margin: 0.2rem 0 0.6rem;
            text-transform: uppercase;
            line-height: 1;
            animation: titleShake 4s infinite alternate;
        }

        @keyframes titleShake {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }

        .tagline {
            font-size: 1.25rem;
            color: #e0ff80;
            margin-bottom: 2.5rem;
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            max-width: 86%;
            font-weight: 500;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 340px;
        }

        .form-group input {
            width: 100%;
            padding: 1.15rem 1.6rem;
            border-radius: 50px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            backdrop-filter: blur(15px);
            color: white;
            font-size: 1.05rem;
            text-align: center;
            box-shadow: 0 0 25px rgba(195,246,12,0.25);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neon);
            box-shadow: 0 0 40px var(--glow);
            transform: scale(1.04);
        }

        #message {
            margin: 1.6rem 0;
            font-size: 1.15rem;
            min-height: 1.6em;
            text-align: center;
            font-weight: 500;
        }

        #payBtn {
            margin: 1.5rem auto 0;
            padding: 1.25rem 4rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #c3f60c, #a0d00a);
            color: #000;
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 12px 45px var(--glow);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        #payBtn:hover {
            transform: translateY(-6px) scale(1.06);
            box-shadow: 0 25px 70px var(--glow);
        }

        #payBtn.loading::after {
            content: " •••";
        }

        #payBtn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <video class="hero-video" autoplay muted loop playsinline>
        <source src="https://cdn.shopify.com/videos/c/o/v/8d1f9e76b0374ef49c9ad0f335437a1f.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="particles">
        <div class="particle" style="left:8%; animation-delay:0s;"></div>
        <div class="particle" style="left:22%; animation-delay:1.2s;"></div>
        <div class="particle" style="left:38%; animation-delay:3.5s;"></div>
        <div class="particle" style="left:55%; animation-delay:0.8s;"></div>
        <div class="particle" style="left:72%; animation-delay:2.7s;"></div>
        <div class="particle" style="left:85%; animation-delay:4.1s;"></div>
        <div class="particle" style="left:95%; animation-delay:1.8s; width:8px; height:8px;"></div>
    </div>

    <div class="logo-container">
        <img src="https://cdn.shopify.com/s/files/1/0962/6648/6067/files/HABA_HOUSE.png?v=1765412962"
             alt="CUBE Logo" class="logo">
    </div>

    <h1>BOOST</h1>
    <div class="tagline">LEVEL UP YOUR MEMBERSHIP &amp; BOOST YOUR HOST 🔥</div>

    <div class="form-container">
        <div class="form-group">
            <input type="text" placeholder="@username" id="chatId">
        </div>
        <div class="form-group">
            <input type="email" placeholder="Email Address" id="email">
        </div>
    </div>

    <div id="message"></div>
    <button id="payBtn">BOOST NOW</button>

    <script src="https://js.paystack.co/v2/inline.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            updateDoc,
            serverTimestamp,
            increment,
            addDoc,
            collection
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_GjkTox5tum9o4AupO0LeWzjTocJg8RI",
            authDomain: "dettyverse.firebaseapp.com",
            projectId: "dettyverse",
            storageBucket: "dettyverse.firebasestorage.app",
            messagingSenderId: "1036459652488",
            appId: "1:1036459652488:web:e8910172ed16e9cac9b63d",
            measurementId: "G-NX2KWZW85V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const messageEl = document.getElementById('message');
        const payBtn = document.getElementById('payBtn');
        const chatIdInput = document.getElementById('chatId');
        const emailInput = document.getElementById('email');

        const sanitizeKey = email => email.trim().toLowerCase()
            .replace(/[@.]/g, '_')
            .replace(/[,\\/*[\]]/g, '_')
            .replace(/_+/g, '_')
            .replace(/^_|_$/g, '');

        function showMessage(text, isError = false) {
            messageEl.textContent = text;
            messageEl.style.color = isError ? '#ff4444' : '#c3f60c';
        }

        // Boost sound
        const boostSound = new Audio("https://freesound.org/data/previews/276/276951_5123854-lq.mp3");
        boostSound.volume = 0.8;

        function createExplosion() {
            // Flash
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.background = 'rgba(195, 246, 12, 0.3)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '9998';
            document.body.appendChild(flash);
            
            flash.animate([{ opacity: 0 }, { opacity: 0.65 }, { opacity: 0 }], { duration: 300 });
            setTimeout(() => flash.remove(), 450);

            // Particles
            const colors = ['#c3f60c', '#f0ff7a', '#a0d00a', '#ffffff'];
            for (let i = 0; i < 90; i++) {
                const p = document.createElement('div');
                p.style.position = 'fixed';
                p.style.top = '50%';
                p.style.left = '50%';
                p.style.transform = 'translate(-50%, -50%)';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.width = p.style.height = Math.random() * 10 + 5 + 'px';
                p.style.borderRadius = '50%';
                p.style.boxShadow = '0 0 25px currentColor';
                p.style.pointerEvents = 'none';
                p.style.zIndex = '9999';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 420 + 140;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 90;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0.1)`, opacity: 0 }
                ], {
                    duration: Math.random() * 950 + 750,
                    easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)'
                });

                setTimeout(() => p.remove(), 1700);
            }

            // Screen shake
            document.body.style.transition = 'transform 60ms';
            document.body.style.transform = 'translateX(6px)';
            setTimeout(() => document.body.style.transform = 'translateX(-6px)', 60);
            setTimeout(() => document.body.style.transform = 'translateX(4px)', 140);
            setTimeout(() => document.body.style.transform = 'translateX(0)', 220);
        }

        payBtn.onclick = async () => {
            const chatId = chatIdInput.value.trim().replace(/^@+/, '');
            const email = emailInput.value.trim().toLowerCase();

            if (!chatId || !email) {
                showMessage('Please fill in all fields', true);
                return;
            }
            if (!email.includes('@')) {
                showMessage('Please enter a valid email', true);
                return;
            }

            // Effects
            boostSound.currentTime = 0;
            boostSound.play().catch(() => {});
            createExplosion();

            payBtn.disabled = true;
            payBtn.classList.add('loading');
            showMessage('Verifying your account...');

            const docId = sanitizeKey(email);
            const userRef = doc(db, "users", docId);

            try {
                const snap = await getDoc(userRef);
                if (!snap.exists()) {
                    showMessage('Account not found', true);
                    resetButton();
                    return;
                }

                const userData = snap.data();

                if (userData.chatIdLower !== chatId.toLowerCase()) {
                    showMessage('Username does not match our records', true);
                    resetButton();
                    return;
                }

                if (!userData.isVIP) {
                    showMessage('This account is not VIP — upgrade first', true);
                    resetButton();
                    return;
                }

                showMessage('Verified! Opening payment...');

                const handler = PaystackPop.setup({
                    key: 'pk_test_9446fa6b81888ffce77cc94294530d761aac4ccd',
                    email: email,
                    amount: 10749 * 100,
                    currency: 'NGN',
                    ref: 'BOOST_' + Date.now(),
                    metadata: {
                        chatId: chatId,
                        type: 'renewal'
                    },
                    callback: async function(response) {
                        showMessage('Processing your boost...');
                        try {
                            const freshSnap = await getDoc(userRef);
                            const freshUserData = freshSnap.data();
                            const inviterId = freshUserData?.invitedBy;

                            await updateDoc(userRef, {
                                hasPaid: true,
                                membershipLevel: increment(1),
                                vipRenewedAt: serverTimestamp(),
                                stars: increment(2500),
                                starsReward: increment(2500),
                                vipExpiresAt: new Date(Date.now() + 31 * 24 * 60 * 60 * 1000),
                                lastUpdated: serverTimestamp()
                            });

                            if (inviterId) {
                                const inviterRef = doc(db, "users", inviterId);
                                await updateDoc(inviterRef, {
                                    cash: increment(2512),
                                    cashReward: increment(2512),
                                    points: increment(5),
                                    lastUpdated: serverTimestamp()
                                });

                                await addDoc(collection(db, "notifications"), {
                                    recipientId: inviterId,
                                    type: "renewal_reward",
                                    title: "₦2,512 Cash Reward Earned!",
                                    message: `@${freshUserData.chatId || "someone"} just boosted!`,
                                    relatedUserId: docId,
                                    relatedUserName: freshUserData.chatId || chatId,
                                    read: false,
                                    createdAt: serverTimestamp()
                                });
                            }

                            await addDoc(collection(db, "notifications"), {
                                recipientId: docId,
                                type: "renewal_success",
                                title: "Boost Activated! 🔥",
                                message: "Your host tab has been boosted. Enjoy the new perks!",
                                read: false,
                                createdAt: serverTimestamp()
                            });

                            showMessage('Boost Complete! 🔥');
                            setTimeout(() => {
                                window.location.href = "https://visitcube.xyz";
                            }, 1600);
                        } catch (err) {
                            console.error(err);
                            showMessage('Payment received — sync failed. Contact support.', true);
                            setTimeout(() => window.location.href = "https://visitcube.xyz", 3500);
                        }
                    },
                    onClose: function() {
                        showMessage('Payment cancelled');
                        resetButton();
                    }
                });

                handler.openIframe();
            } catch (err) {
                console.error(err);
                showMessage('Something went wrong. Please try again.', true);
                resetButton();
            }
        };

        function resetButton() {
            payBtn.disabled = false;
            payBtn.classList.remove('loading');
        }
    </script>
</body>
</html>

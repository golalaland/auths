<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dettyverse Admin - Content Management</title>
  <style>
    body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; padding: 20px; margin: 0; }
    .tab-container { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
    .tab { padding: 12px 24px; background: #333; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
    .tab:hover { background: #444; }
    .tab.active { background: #c3f60c; color: #000; font-weight: bold; }
    .section { display: none; background: #1a1a1a; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .section.active { display: block; }
    input, textarea, button { padding: 10px; margin: 5px 5px 10px 0; border-radius: 8px; border: none; font-size: 1rem; }
    button { background: #c3f60c; color: #000; cursor: pointer; font-weight: bold; }
    button:hover { transform: scale(1.05); }

    #loaderOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
    #dopeAlert { position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(16px); display: none; align-items: center; justify-content: center; z-index: 999999; }
    #dopeAlertContent { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); padding: 40px 30px; border-radius: 24px; max-width: 420px; width: 90%; text-align: center; box-shadow: 0 0 80px rgba(195,246,12,0.4); border: 2px solid #c3f60c; }

    .card-preview { background: #111; border-radius: 12px; padding: 15px; margin: 12px 0; border: 1px solid #333; }
    .card-preview h4 { margin: 0 0 8px; color: #c3f60c; }
    .actions button { margin-right: 8px; padding: 6px 12px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div id="loaderOverlay"><div id="loaderText">Working...</div></div>

  <h1>Dettyverse Content Management</h1>

  <div class="tab-container">
    <div class="tab active" data-tab="upcoming">Upcoming Events</div>
    <div class="tab" data-tab="tvshows">TV Shows</div>
  </div>

  <div id="dopeAlert">
    <div id="dopeAlertContent">
      <div id="dopeIcon">✅</div>
      <h2 id="dopeTitle">Success!</h2>
      <p id="dopeMessage">Operation completed successfully.</p>
      <button id="dopeClose">GOT IT</button>
    </div>
  </div>

  <!-- UPCOMING EVENTS -->
  <div id="upcoming" class="section active">
    <h2>Manage Upcoming Events</h2>
    <button id="fetch-upcoming">Refresh</button>
    <button id="add-new-event">+ Add New Event</button>
    <div id="events-container" style="margin-top: 20px;"></div>

    <template id="event-form-template">
      <div style="background:#222; padding:16px; border-radius:12px; margin:16px 0;">
        <input type="text" placeholder="Title" class="event-title" style="width:100%; margin-bottom:8px;">
        <input type="text" placeholder="Time" class="event-time" style="width:100%; margin-bottom:8px;">
        <textarea placeholder="Description" class="event-desc" style="width:100%; height:80px; margin-bottom:8px;"></textarea>
        <input type="url" placeholder="Image URL" class="event-image" style="width:100%; margin-bottom:8px;">
        <input type="url" placeholder="Link (optional)" class="event-link" style="width:100%; margin-bottom:12px;">
        <button class="save-event-btn" style="background:#c3f60c; color:#000;">Save Event</button>
        <button class="cancel-event-btn">Cancel</button>
      </div>
    </template>
  </div>

  <!-- TV SHOWS -->
  <div id="tvshows" class="section">
    <h2>TV Shows Management</h2>
    <button id="fetch-tvshows">Refresh</button>
    <button id="add-new-tvshow">+ Add New Video</button>
    <div id="tvshows-container" style="margin-top: 20px;"></div>

    <template id="tvshow-form-template">
      <div style="background:#222; padding:16px; border-radius:12px; margin:16px 0;">
        <input type="text" placeholder="Title" class="tv-title" style="width:100%; margin-bottom:8px;">
        <input type="text" placeholder="Channel" class="tv-channel" style="width:100%; margin-bottom:8px;">
        <input type="url" placeholder="Video MP4 URL" class="tv-url" style="width:100%; margin-bottom:12px;">
        <button class="save-tvshow-btn" style="background:#c3f60c; color:#000;">Save Video</button>
        <button class="cancel-tvshow-btn">Cancel</button>
      </div>
    </template>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD_GjkTox5tum9o4AupO0LeWzjTocJg8RI",
    authDomain: "dettyverse.firebaseapp.com",
    projectId: "dettyverse",
    storageBucket: "dettyverse.firebasestorage.app",
    messagingSenderId: "1036459652488",
    appId: "1:1036459652488:web:e8910172ed16e9cac9b63d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const loaderOverlay = document.getElementById("loaderOverlay");
  const loaderText = document.getElementById("loaderText");
  const dopeAlert = document.getElementById("dopeAlert");
  const dopeTitle = document.getElementById("dopeTitle");
  const dopeMessage = document.getElementById("dopeMessage");
  const dopeIcon = document.getElementById("dopeIcon");
  const dopeClose = document.getElementById("dopeClose");

  function showLoader(text = "Working...") {
    loaderText.textContent = text;
    loaderOverlay.style.display = "flex";
  }

  function hideLoader() {
    loaderOverlay.style.display = "none";
  }

  function showDopeAlert(title, message) {
    dopeTitle.textContent = title;
    dopeMessage.textContent = message;
    dopeAlert.style.display = "flex";
    setTimeout(() => dopeAlert.style.opacity = "1", 50);
  }

  dopeClose.onclick = () => {
    dopeAlert.style.opacity = "0";
    setTimeout(() => dopeAlert.style.display = "none", 400);
  };

  // Tab Switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(tab.dataset.tab).classList.add('active');
    });
  });

  // ================== COMMON SAVE FUNCTION ==================
  async function saveToFirebase(field, data) {
    try {
      await setDoc(doc(db, "settings", "live"), { [field]: data }, { merge: true });
      return true;
    } catch (err) {
      console.error(err);
      alert("Save failed: " + err.message);
      return false;
    }
  }

  // ================== TV SHOWS ==================
  async function getTVShows() {
    showLoader("Loading TV Shows...");
    const snap = await getDoc(doc(db, "settings", "live"));
    hideLoader();
    return snap.exists() ? (snap.data().tvShows || []) : [];
  }

  function renderTVShows(shows) {
    const container = document.getElementById('tvshows-container');
    container.innerHTML = '';
    if (shows.length === 0) {
      container.innerHTML = '<p style="color:#888;">No videos yet. Add some!</p>';
      return;
    }
    shows.forEach((show, i) => {
      const card = document.createElement('div');
      card.className = 'card-preview';
      card.innerHTML = `
        <h4>${show.title}</h4>
        <p><strong>Channel:</strong> ${show.channel || 'N/A'}</p>
        <p><strong>URL:</strong> <a href="${show.url}" target="_blank">View</a></p>
        <div class="actions">
          <button data-index="${i}" class="edit-tv">Edit</button>
          <button data-index="${i}" class="delete-tv">Delete</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function loadTVShows() {
    const shows = await getTVShows();
    renderTVShows(shows);
  }

  // Add / Edit / Delete for TV Shows (simplified for space)
  document.getElementById('add-new-tvshow').onclick = async () => {
    // Full form logic here
    alert("Add TV Show form - implement as needed");
  };

  document.getElementById('fetch-tvshows').onclick = loadTVShows;

  // ================== UPCOMING EVENTS ==================
  // (Same pattern as TV Shows - you can expand similarly)

  // Initial Load
  loadTVShows();
</script>
</body>
</html>

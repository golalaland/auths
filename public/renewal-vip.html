<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=0.85, user-scalable=no">
  <title>CUBE BOOST</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #c3f60c;
      --deep: #0a1400;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1400, #111900, #000000);
      font-family: 'Poppins', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }
    .hero-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -3;
      opacity: 0.35;
      filter: brightness(0.65);
    }
    .hero-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, transparent 30%, #000 85%);
      z-index: -2;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.8rem;
      background: linear-gradient(90deg, var(--neon), #e0ff4a, var(--neon));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px var(--neon);
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 2rem;
      text-align: center;
    }
    .form-group input {
      width: 320px;
      max-width: 90vw;
      padding: 1.1rem 1.4rem;
      margin: 0.7rem 0;
      border-radius: 50px;
      border: 1px solid rgba(195,246,12,0.5);
      background: rgba(10,25,0,0.75);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 1.05rem;
      text-align: center;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 25px rgba(195,246,12,0.6);
    }
    #payBtn {
      margin-top: 1.5rem;
      padding: 1.1rem 4rem;
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c3f60c, #a0d00a);
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(195,246,12,0.7);
      transition: all 0.3s;
    }
    #payBtn:hover { transform: scale(1.05); }
    #payBtn.loading {
      opacity: 0.7;
      pointer-events: none;
    }
    #message {
      margin-top: 1.2rem;
      font-size: 1.05rem;
      min-height: 1.4em;
      text-align: center;
    }
    .logo {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      filter: drop-shadow(0 0 20px #c3f60c);
      animation: logoPulse 4s infinite alternate ease-in-out;
    }
    @keyframes logoPulse {
      from { filter: drop-shadow(0 0 15px #c3f60c); }
      to { filter: drop-shadow(0 0 35px #c3f60c); }
    }
  </style>
</head>
<body>

  <video class="hero-video" autoplay muted loop playsinline>
    <source src="https://your-video-url.mp4" type="video/mp4"> <!-- Replace with your actual video -->
  </video>
  <div class="hero-overlay"></div>

  <img src="https://cdn.shopify.com/s/files/1/0850/XXXXX/files/HABA_HOUSE.png" alt="CUBE Logo" class="logo">

  <h1>BOOST</h1>
  <p class="subtitle">Renew your VIP status • Support your host</p>

  <div class="form-group">
    <input type="text" id="chatId" placeholder="@yourchatid" required>
    <input type="email" id="email" placeholder="your@email.com" required>
    <input type="tel" id="phone" placeholder="Phone number" required>
  </div>

  <button id="payBtn">BOOST NOW - ₦10,749</button>
  <div id="message"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_GjkTox5tum9o4AupO0LeWzjTocJg8RI",
  authDomain: "dettyverse.firebaseapp.com",
  projectId: "dettyverse",
  storageBucket: "dettyverse.firebasestorage.app",
  messagingSenderId: "1036459652488",
  appId: "1:1036459652488:web:f4284cbc49c8074bc9b63d",
};

const app = initializeApp(firebaseConfig);
const functions = getFunctions(app, "us-central1");

const messageEl = document.getElementById('message');
const payBtn = document.getElementById('payBtn');
const chatIdInput = document.getElementById('chatId');
const emailInput = document.getElementById('email');
const phoneInput = document.getElementById('phone');

const boostSound = new Audio("https://freesound.org/data/previews/276/276951_5123854-lq.mp3");
boostSound.volume = 0.8;

// Explosive neon effect (good for men's eyes)
function createExplosion() {
  // Background flash
  const flash = document.createElement('div');
  flash.style.cssText = `position:fixed;inset:0;background:rgba(195,246,12,0.4);z-index:9998;pointer-events:none;`;
  document.body.appendChild(flash);
  flash.animate([{opacity: 0}, {opacity: 0.75}, {opacity: 0}], {duration: 280});

  // Neon particles
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.style.cssText = `
      position:fixed; top:50%; left:50%; width:${Math.random()*8 + 4}px; height:${Math.random()*8 + 4}px;
      background:#c3f60c; border-radius:50%; box-shadow:0 0 20px #c3f60c; pointer-events:none; z-index:9999;
    `;
    document.body.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const vel = Math.random() * 520 + 180;
    const tx = Math.cos(angle) * vel;
    const ty = Math.sin(angle) * vel - 100;

    p.animate([
      { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
      { transform: `translate(${tx}px, ${ty}px) scale(0.1)`, opacity: 0 }
    ], {
      duration: Math.random() * 900 + 1100,
      easing: 'cubic-bezier(0.22, 0.1, 0.35, 1)'
    });

    setTimeout(() => p.remove(), 2200);
  }

  // Screen shake
  document.body.style.transition = 'transform 60ms';
  document.body.style.transform = 'translate(6px, -3px)';
  setTimeout(() => document.body.style.transform = 'translate(-5px, 4px)', 60);
  setTimeout(() => document.body.style.transform = '', 220);
}

function showMessage(text, isError = false) {
  messageEl.textContent = text;
  messageEl.style.color = isError ? '#ff4444' : '#c3f60c';
}

function resetButton() {
  payBtn.disabled = false;
  payBtn.classList.remove('loading');
}

payBtn.onclick = async () => {
  const chatId = chatIdInput.value.trim().replace(/^@+/, '');
  const email = emailInput.value.trim().toLowerCase();
  const phone = phoneInput.value.trim();

  // Validation first
  if (!chatId || !email || !phone) {
    showMessage('Please fill all fields', true);
    return;
  }
  if (!email.includes('@')) {
    showMessage('Please enter a valid email', true);
    return;
  }

  // === TRIGGER BOOST EFFECT ONLY WHEN FIELDS ARE VALID ===
  boostSound.currentTime = 0;
  boostSound.play().catch(() => {});
  createExplosion();

  payBtn.disabled = true;
  payBtn.classList.add('loading');
  showMessage('Processing your BOOST...');

  try {
    const verifyRenewal = httpsCallable(functions, 'verifyRenewal');

    const result = await verifyRenewal({
      chatId,
      email,
      phone,
      type: 'renewal'
    });

    if (result.data.success) {
      showMessage('BOOST Activated Successfully! 🔥', false);
      setTimeout(() => {
        window.location.href = "https://visitcube.xyz";
      }, 1600);
    } else {
      showMessage(result.data.message || 'Boost failed', true);
      resetButton();
    }
  } catch (err) {
    console.error(err);
    showMessage('Something went wrong. Please contact support.', true);
    resetButton();
  }
};
</script>
</body>
</html>
